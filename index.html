
            
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rajneeti: Parliament Edition</title>
    <style>
        body {
            background-color: #2b1f1d;
            color: #f4ecd8;
            font-family: 'Courier New', Courier, monospace;
            padding: 10px;
            margin: 0;
            display: flex;
            justify-content: center;
        }
        #game-container {
            max-width: 500px;
            width: 100%;
            border: 3px solid #8b5a2b;
            padding: 15px;
            background-color: #3d2b1f;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
            border-radius: 8px;
            box-sizing: border-box;
        }
        h2, h3 {
            color: #d4af37;
            text-align: center;
            margin: 5px 0;
        }
        .stats-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            background-color: #1a110b;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 12px;
        }
        .stat {
            font-weight: bold;
            font-size: 0.95rem;
            text-align: center;
        }
        
        /* PARLIAMENT VISUAL GRID */
        .parliament-header {
            text-align: center;
            font-size: 0.85rem;
            margin-bottom: 4px;
            color: #bfa38a;
        }
        #parliament-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
            background-color: #1a110b;
            padding: 8px;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        .seat {
            width: 100%;
            padding-top: 100%;
            position: relative;
            border-radius: 3px;
        }
        .seat-inner {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 3px;
        }

        /* PARTY LEGEND SYMBOLS */
        .party-legend {
            display: flex;
            justify-content: space-around;
            background-color: #261910;
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 0.75rem;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* POLITICIAN PROFILE DOSSIER */
        #profile-box {
            background-color: #22140c;
            border: 1px dashed #d4af37;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 0.85rem;
            line-height: 1.4;
        }

        #bill-box {
            background-color: #4a3525;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #8b5a2b;
            text-align: center;
            margin-bottom: 15px;
            min-height: 90px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .btn-container {
            display: flex;
            gap: 10px;
        }
        button {
            flex: 1;
            padding: 12px;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <h2>RAJNEETI SIMULATOR</h2>
        
        <div class="stats-box">
            <div class="stat">Year: <span id="year" style="color: #ff9800;">2026</span></div>
            <div class="stat">Approval: <span id="pop" style="color: #4caf50;">50</span>%</div>
            <div class="stat" style="grid-column: span 2;">Treasury: ₹<span id="cash" style="color: #ffeb3b;">1000</span> Cr (Net: <span id="income">+100</span>/yr)</div>
        </div>

        <div class="parliament-header">PARLIAMENT SEAT ALLOCATION (100 TOTAL)</div>
        <div id="parliament-grid"></div>

        <div class="party-legend">
            <div class="legend-item"><span style="color:#ff3333;">🚩</span> <span id="lbl-nat">National (45)</span></div>
            <div class="legend-item"><span style="color:#3388ff;">☀️</span> <span id="lbl-prog">Progress (35)</span></div>
            <div class="legend-item"><span style="color:#33cc33;">💼</span> <span id="lbl-all">Alliance (20)</span></div>
        </div>

        <h3>CURRENT BILL SPONSOR</h3>
        <div id="profile-box">
            <strong>Name:</strong> <span id="char-name">---</span><br>
            <strong>Party Faction:</strong> <span id="char-party">---</span><br>
            <strong>Loyalty Score:</strong> <span id="char-loyalty">0</span>/100 | 
            <strong>Corruption Index:</strong> <span id="char-corrupt">0</span>%
        </div>

        <div id="bill-box">
            <h3 id="bill-title">PROPOSED BILL</h3>
            <p id="bill-text">Loading agenda...</p>
        </div>

        <div class="btn-container" id="vote-actions">
            <button onclick="castVote(true)" style="background-color: #2e7d32;">PASS LAW</button>
            <button onclick="castVote(false)" style="background-color: #c62828;">REJECT</button>
        </div>

        <div class="btn-container hidden" id="turn-actions">
            <button onclick="advanceYear()" style="background-color: #ff9800; color: #1a110b;">ADVANCE TO NEXT YEAR ⏳</button>
        </div>
    </div>

    <script>
        // Game Logic Data
        let currentYear = 2026;
        let popularity = 50;
        let treasury = 1000;
        let baseIncome = 100;
        let activeBillsThisYear = 0;
        const maxBillsPerYear = 3;

        // Party setup database
        const parties = {
            national: { color: "#ff3333", seats: 45, name: "Nationalist Front", symbol: "🚩" },
            progress: { color: "#3388ff", seats: 35, name: "Progressive Party", symbol: "☀️" },
            alliance: { color: "#33cc33", seats: 20, name: "Business Alliance", symbol: "💼" }
        };

        const candidateFirstNames = ["Rohan", "Amit", "Vikram", "Sanjay", "Priya", "Arjun", "Meera", "Karan", "Rahul", "Anjali"];
        const candidateLastNames = ["Sharma", "Verma", "Patel", "Singh", "Joshi", "Reddy", "Mehta", "Das", "Nair", "Kapoor"];

        const billDatabase = [
            { text: "Increase corporate tax on Business Alliance corporations to fill state funds?", popChange: 10, cashChange: 200, netIncomeChange: 40, targetParty: "alliance", dynamicSeatShift: -3 },
            { text: "Fund a major urban green infrastructure transportation layout?", popChange: 15, cashChange: -300, netIncomeChange: -20, targetParty: "progress", dynamicSeatShift: 4 },
            { text: "Impose strict state cybersecurity monitoring laws championed by Nationalists?", popChange: -10, cashChange: -50, netIncomeChange: 10, targetParty: "national", dynamicSeatShift: 3 },
            { text: "Pass a sweeping agricultural subsidy plan to lower farming overheads?", popChange: 15, cashChange: -200, netIncomeChange: -30, targetParty: "progress", dynamicSeatShift: 2 },
            { text: "Deregulate industrial environmental rules to boost mining production?", popChange: -15, cashChange: 350, netIncomeChange: 60, targetParty: "alliance", dynamicSeatShift: 4 },
            { text: "Increase local police department budgets across all internal districts?", popChange: 5, cashChange: -100, netIncomeChange: -15, targetParty: "national", dynamicSeatShift: 2 }
        ];

        let selectedBill = null;

        // Render the 100 seats visual grid block
        function renderParliament() {
            const grid = document.getElementById("parliament-grid");
            grid.innerHTML = "";
            
            let seatArray = [];
            for(let i=0; i<parties.national.seats; i++) seatArray.push(parties.national.color);
            for(let i=0; i<parties.progress.seats; i++) seatArray.push(parties.progress.color);
            for(let i=0; i<parties.alliance.seats; i++) seatArray.push(parties.alliance.color);

            // Dynamically ensure it stops cleanly at 100 boxes if math fragments
            seatArray = seatArray.slice(0, 100);
            while(seatArray.length < 100) {
                seatArray.push("#444");
            }

            seatArray.forEach(color => {
                let seat = document.createElement("div");
                seat.className = "seat";
                let inner = document.createElement("div");
                inner.className = "seat-inner";
                inner.style.backgroundColor = color;
                seat.appendChild(inner);
                grid.appendChild(seat);
            });

            // Update Labels
            document.getElementById("lbl-nat").innerText = `National (${parties.national.seats})`;
            document.getElementById("lbl-prog").innerText = `Progress (${parties.progress.seats})`;
            document.getElementById("lbl-all").innerText = `Alliance (${parties.alliance.seats})`;
        }

        // Generate a random dynamic politician profile card
        function generateCandidate() {
            let fName = candidateFirstNames[Math.floor(Math.random() * candidateFirstNames.length)];
            let lName = candidateLastNames[Math.floor(Math.random() * candidateLastNames.length)];
            let partyKeys = Object.keys(parties);
            let randomParty = parties[partyKeys[Math.floor(Math.random() * partyKeys.length)]];

            document.getElementById("char-name").innerText = `${fName} ${lName}`;
            document.getElementById("char-party").innerText = `${randomParty.symbol} ${randomParty.name}`;
            document.getElementById("char-loyalty").innerText = Math.floor(Math.random() * 40) + 60;
            document.getElementById("char-corrupt").innerText = Math.floor(Math.random() * 85);
        }

        function pickRandomBill() {
            if (activeBillsThisYear >= maxBillsPerYear) {
                endSession();
                return;
            }
            document.getElementById("bill-title").innerText = "PROPOSED BILL";
            let randomIndex = Math.floor(Math.random() * billDatabase.length);
            selectedBill = billDatabase[randomIndex];
            document.getElementById("bill-text").innerText = selectedBill.text;
            generateCandidate();
        }

        function castVote(isPassed) {
            if (isPassed) {
                popularity += selectedBill.popChange;
                treasury += selectedBill.cashChange;
                baseIncome += selectedBill.netIncomeChange;
                
                // Seat shift math logic
                let shift = selectedBill.dynamicSeatShift;
                let party = selectedBill.targetParty;

                if (party === "progress") {
                    parties.progress.seats += shift;
                    parties.national.seats -= Math.floor(shift/2);
                    parties.alliance.seats -= Math.ceil(shift/2);
                } else if (party === "national") {
                    parties.national.seats += shift;
                    parties.progress.seats -= Math.floor(shift/2);
                    parties.alliance.seats -= Math.ceil(shift/2);
                } else if (party === "alliance") {
                    parties.alliance.seats += shift;
                    parties.progress.seats -= Math.floor(shift/2);
                    parties.national.seats -= Math.ceil(shift/2);
                }

                // Balance scales to prevent negative party volumes
                parties.progress.seats = Math.max(5, parties.progress.seats);
                parties.national.seats = Math.max(5, parties.national.seats);
                parties.alliance.seats = Math.max(5, parties.alliance.seats);
                
                // Lock total sum back to 100 seats exactly
                parties.national.seats = 100 - (parties.progress.seats + parties.alliance.seats);
            }
            
            popularity = Math.max(0, Math.min(100, popularity));
            updateUI();
            checkGameOver();

            if (popularity > 0 && treasury > 0) {
                activeBillsThisYear++;
                pickRandomBill();
            }
        }

        function endSession() {
            document.getElementById("bill-title").innerText = "SESSION CONCLUDED";
            document.getElementById("bill-text").innerText = "All architectural laws for this operational window successfully reviewed.";
            document.getElementById("vote-actions").classList.add("hidden");
            document.getElementById("turn-actions").classList.remove("hidden");
        }

        function advanceYear() {
            currentYear++;
            treasury += baseIncome;
            activeBillsThisYear = 0;
            document.getElementById("turn-actions").classList.add("hidden");
            document.getElementById("vote-actions").classList.remove("hidden");
            updateUI();
            checkGameOver();
            if (popularity > 0 && treasury > 0) pickRandomBill();
        }

        function updateUI() {
            document.getElementById("year").innerText = currentYear;
            document.getElementById("pop").innerText = popularity;
            document.getElementById("cash").innerText = treasury;
            let netElement = document.getElementById("income");
            netElement.innerText = (baseIncome >= 0 ? "+" : "") + baseIncome;
            netElement.style.color = baseIncome >= 0 ? "#4caf50" : "#f44336";
            renderParliament();
        }

        function checkGameOver() {
            if (popularity <= 0 || treasury <= 0) {
                document.getElementById("game-container").innerHTML = `<h2>GAME OVER</h2><button onclick="window.location.reload()" style="background-color: #8b5a2b; margin-top:15px; width:100%;">RETRY</button>`;
            }
        }

        // Bootup
        updateUI();
        pickRandomBill();
    </script>
</body>
</html>
