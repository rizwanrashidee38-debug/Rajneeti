
                     
                 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Pro: Career Sim</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .game-container { background: white; width: 100%; max-width: 500px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 20px; }
        h1 { color: #1a472a; text-align: center; margin-top: 0; }
        
        .stats-grid { display: grid; grid-template-columns: 1-fr 1fr; gap: 10px; background: #e8f5e9; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .stat-item { font-weight: bold; color: #2e7d32; }

        .log-box { height: 150px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; border-radius: 5px; background: #fafafa; font-size: 0.9em; margin-bottom: 20px; display: flex; flex-direction: column-reverse; }
        .log-entry { margin-bottom: 5px; border-left: 3px solid #4caf50; padding-left: 8px; }
        
        .controls { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 12px; font-size: 1em; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; font-weight: bold; }
        .btn-play { background: #2e7d32; color: white; }
        .btn-play:hover { background: #1b5e20; }
        .btn-train { background: #0277bd; color: white; }
        .btn-train:hover { background: #01579b; }
        button:disabled { background: #ccc; cursor: not-allowed; }

        .game-over { text-align: center; color: #c62828; display: none; }
    </style>
</head>
<body>

<div class="game-container">
    <h1>🏏 Career Sim</h1>
    
    <div class="stats-grid">
        <div class="stat-item">Age: <span id="age">16</span></div>
        <div class="stat-item">Skill: <span id="skill">10</span></div>
        <div class="stat-item">Runs: <span id="runs">0</span></div>
        <div class="stat-item">Avg: <span id="avg">0.00</span></div>
        <div class="stat-item">Matches: <span id="matches">0</span></div>
        <div class="stat-item">Wealth: $<span id="money">0</span></div>
    </div>

    <div class="log-box" id="log">
        <div class="log-entry">Welcome to the Academy! Train hard to get selected.</div>
    </div>

    <div class="controls" id="controls">
        <button class="btn-train" onclick="train()">Net Practice (Age +0.2)</button>
        <button class="btn-play" onclick="playMatch()">Play Match (Age +0.1)</button>
    </div>

    <div class="game-over" id="game-over">
        <h2>Career Retired!</h2>
        <p id="final-stats"></p>
        <button onclick="location.reload()">Restart Career</button>
    </div>
</div>

<script>
    let stats = {
        age: 16.0,
        skill: 10,
        runs: 0,
        matches: 0,
        money: 0,
        outs: 0
    };

    function updateUI() {
        document.getElementById('age').innerText = stats.age.toFixed(1);
        document.getElementById('skill').innerText = stats.skill;
        document.getElementById('runs').innerText = stats.runs;
        document.getElementById('matches').innerText = stats.matches;
        document.getElementById('money').innerText = stats.money;
        
        let average = stats.outs > 0 ? (stats.runs / stats.outs).toFixed(2) : stats.runs;
        document.getElementById('avg').innerText = average;

        if (stats.age >= 40) {
            endGame();
        }
    }

    function log(message) {
        const logBox = document.getElementById('log');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerText = message;
        logBox.appendChild(entry);
    }

    function train() {
        stats.age += 0.2;
        let gain = Math.floor(Math.random() * 3) + 1;
        stats.skill += gain;
        log(`Practice session done. Skill +${gain}`);
        updateUI();
    }

    function playMatch() {
        if (stats.skill < 20 && stats.matches > 5) {
            log("You're too unskilled for the local league! Train more.");
            return;
        }

        stats.age += 0.1;
        stats.matches++;
        
        // Match logic based on skill
        let performance = Math.random() * stats.skill;
        let matchRuns = 0;
        let out = Math.random() > 0.1; // 90% chance of being out in a match

        if (performance > 80) {
            matchRuns = Math.floor(Math.random() * 50) + 100; // Century
            log(`🏏 AMAZING! You scored a century: ${matchRuns}!`);
            stats.money += 500;
        } else if (performance > 40) {
            matchRuns = Math.floor(Math.random() * 40) + 30;
            log(`Good knock: ${matchRuns} runs.`);
            stats.money += 100;
        } else if (performance > 10) {
            matchRuns = Math.floor(Math.random() * 20);
            log(`Struggled for ${matchRuns} runs.`);
            stats.money += 20;
        } else {
            matchRuns = 0;
            log(`Duck! You got out for 0.`);
        }

        stats.runs += matchRuns;
        if (out) stats.outs++;
        updateUI();
    }

    function endGame() {
        document.getElementById('controls').style.display = 'none';
        document.getElementById('game-over').style.display = 'block';
        let finalAvg = stats.outs > 0 ? (stats.runs / stats.outs).toFixed(2) : stats.runs;
        document.getElementById('final-stats').innerText = 
            `Retired at 40. Total Runs: ${stats.runs} | Avg: ${finalAvg} | Wealth: $${stats.money}`;
    }
</script>

</body>
</html>
