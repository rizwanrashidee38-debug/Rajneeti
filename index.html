

        <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rajneeti: Parliament Edition</title>
    <style>
        body {
            background-color: #2b1f1d;
            color: #f4ecd8;
            font-family: 'Courier New', Courier, monospace;
            padding: 10px;
            margin: 0;
            display: flex;
            justify-content: center;
        }
        #game-container {
            max-width: 500px;
            width: 100%;
            border: 3px solid #8b5a2b;
            padding: 15px;
            background-color: #3d2b1f;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
            border-radius: 8px;
            box-sizing: border-box;
        }
        h2, h3 {
            color: #d4af37;
            text-align: center;
            margin: 5px 0;
        }
        .stats-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            background-color: #1a110b;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 12px;
        }
        .stat {
            font-weight: bold;
            font-size: 0.95rem;
            text-align: center;
        }
        
        /* PARLIAMENT VISUAL GRID */
        .parliament-header {
            text-align: center;
            font-size: 0.85rem;
            margin-bottom: 4px;
            color: #bfa38a;
        }
        #parliament-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
            background-color: #1a110b;
            padding: 8px;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        .seat {
            width: 100%;
            padding-top: 100%; /* Keeps seats perfectly square */
            position: relative;
            border-radius: 3px;
            background-color: #444;
        }
        .seat-inner {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 3px;
        }

        /* PARTY LEGEND SYMBOLS */
        .party-legend {
            display: flex;
            justify-content: space-between;
            background-color: #261910;
            padding: 6px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 0.75rem;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 5px;
        }

        /* POLITICIAN PROFILE DOSSIER */
        #profile-box {
            background-color: #22140c;
            border: 1px dashed #d4af37;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 0.85rem;
        }

        #bill-box {
            background-color: #4a3525;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #8b5a2b;
            text-align: center;
            margin-bottom: 15px;
            min-height: 90px;
        }
        .btn-container {
            display: flex;
            gap: 10px;
        }
        button {
            flex: 1;
            padding: 12px;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <h2>RAJNEETI SIMULATOR</h2>
        
        <div class="stats-box">

        <div class="parliament-header">PARLIAMENT SEAT ALLOCATION (100 TOTAL)</div>
        <div id="parliament-grid"></div>

        <div class="party-legend">

            <div class="legend-item"><div class="dot" style="background:#3388ff;"></div> <span>☀️ Progress (35)</span></div>
            <div class="legend-item"><div class="dot" style="background:#33cc33;"></div> <span>💼 Alliance (20)</span></div>

        </div>

        <div id="bill-box">

            <p id="bill-text">Loading agenda...</p>
        </div>

        <div class="btn-container" id="vote-actions">
            <button onclick="castVote(true)" style="background-color: #2e7d32;">PASS LAW</button>
            <button onclick="castVote(false)" style="background-color: #c62828;">REJECT</button>
        </div>

        <div class="btn-container hidden" id="turn-actions">
            <button onclick="advanceYear()" style="background-color: #ff9800; color: #1a110b;">ADVANCE TO NEXT YEAR ⏳</button>
        </div>
    </div>

        }
